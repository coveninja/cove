name: CI

# Run on every push/PR to catch regressions. On tag pushes the same checks
# run plus the `package` job, which bundles a release asset and uploads it.
on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

permissions:
  contents: write  # needed for the package job to upload release assets

jobs:
  go:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: go build -ldflags "-X main.Version=${{ github.ref_name }} -X main.TmdbApiKey=${{ secrets.TMDB_API_KEY }}" -o cove .

      - name: Vet
        run: go vet ./...

  web:
    name: Web build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

  qt:
    name: Qt shell build (Linux, best-effort)
    runs-on: ubuntu-24.04
    # Qt6 WebEngine and libmpv availability in CI runners can vary — treat as
    # non-blocking until the build is known stable in this environment.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + mpv + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-webengine-dev \
            libqt6webchannel6-dev \
            libmpv-dev

      - name: Configure
        run: cmake -S qt -B qt/build -G Ninja

      - name: Build
        run: cmake --build qt/build

  package:
    name: Package release asset (Flatpak)
    needs: [go, web]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Build Go backend and web frontend outside the Flatpak sandbox (both
      # require network/tools not available inside it). The Flatpak manifest
      # picks them up via the type:dir source and copies them into /app.
      # The Qt shell is also built here for the PKGBUILD tarball.
      - name: Install Qt6 + mpv build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            qt6-base-dev qt6-declarative-dev qt6-webengine-dev \
            libqt6webchannel6-dev libmpv-dev

      - name: Build Go backend
        env:
          CGO_ENABLED: '0'
        run: go build -ldflags "-X main.Version=${{ github.ref_name }} -X main.TmdbApiKey=${{ secrets.TMDB_API_KEY }}" -o cove .

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build web frontend
        working-directory: web
        run: npm run build

      - name: Build Qt shell (native, for PKGBUILD tarball)
        run: |
          cmake -S qt -B qt/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build qt/build

      - name: Assemble PKGBUILD tarball
        run: |
          mkdir -p _pkg/bin _pkg/lib/cove _pkg/share/cove \
                   _pkg/share/applications \
                   "_pkg/share/icons/hicolor/scalable/apps"

          # Launcher — uses system paths, no QTWEBENGINEPROCESS_PATH needed
          cat > _pkg/bin/cove << 'EOF'
#!/bin/sh
exec /usr/lib/cove/cove_shell --backend /usr/lib/cove/cove --webroot /usr/share/cove/web "$@"
EOF
          chmod +x _pkg/bin/cove

          cp cove                   _pkg/lib/cove/cove
          cp qt/build/cove_shell    _pkg/lib/cove/cove_shell
          cp -r web/dist            _pkg/share/cove/web
          cp flatpak/io.github.arcadyi.Cove.desktop \
             _pkg/share/applications/
          cp web/src/assets/CoveIcon.svg \
             "_pkg/share/icons/hicolor/scalable/apps/io.github.arcadyi.Cove.svg"

          tar -czf cove-linux-amd64.tar.gz -C _pkg .

      - name: Generate PKGBUILD
        run: |
          PKG_VER="${{ github.ref_name }}"
          PKG_VER="${PKG_VER#v}"
          SHA256=$(sha256sum cove-linux-amd64.tar.gz | cut -d' ' -f1)
          sed -e "s/__VERSION__/${PKG_VER}/" \
              -e "s/__SHA256__/${SHA256}/" \
              packaging/PKGBUILD > PKGBUILD

      - name: Install Flatpak build tools and runtimes
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --system --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install --system -y --noninteractive flathub \
            org.kde.Sdk//6.9 \
            org.kde.Platform//6.9 \
            io.qt.qtwebengine.BaseApp//6.9

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: cove-linux-amd64.flatpak
          manifest-path: flatpak/io.github.arcadyi.Cove.yml
          cache-key: flatpak-builder-${{ hashFiles('flatpak/io.github.arcadyi.Cove.yml') }}
          upload-artifact: false

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cove-linux-amd64.flatpak
            cove-linux-amd64.tar.gz
            PKGBUILD
