name: CI

# Run on every push/PR to catch regressions. On tag pushes the same checks
# run plus the `package` job, which bundles a release asset and uploads it.
on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

permissions:
  contents: write  # needed for the package job to upload release assets

jobs:
  go:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: go build -ldflags "-X main.Version=${{ github.ref_name }}" -o cove .

      - name: Vet
        run: go vet ./...

  web:
    name: Web build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

  qt:
    name: Qt shell build (Linux, best-effort)
    runs-on: ubuntu-24.04
    # Qt6 WebEngine and libmpv availability in CI runners can vary — treat as
    # non-blocking until the build is known stable in this environment.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + mpv + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-webengine-dev \
            libqt6webchannel6-dev \
            libmpv-dev

      - name: Configure
        run: cmake -S qt -B qt/build -G Ninja

      - name: Build
        run: cmake --build qt/build

  package:
    name: Package release asset (AppImage)
    needs: [go, web]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Qt6 + mpv + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-webengine-dev \
            libqt6webchannel6-dev \
            qt6-wayland \
            libmpv-dev \
            librsvg2-bin

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build Go backend
        env:
          CGO_ENABLED: '0'
        run: go build -ldflags "-X main.Version=${{ github.ref_name }}" -o cove .

      - name: Build web frontend
        working-directory: web
        run: npm run build

      - name: Build Qt shell
        run: |
          cmake -S qt -B qt/build -G Ninja
          cmake --build qt/build

      - name: Download AppImage tools
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage appimagetool-x86_64.AppImage

      - name: Convert icon SVG → PNG
        run: rsvg-convert -w 256 -h 256 web/src/assets/CoveIcon.svg -o cove.png

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib/cove
          mkdir -p AppDir/usr/share/cove/web
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp qt/build/cove_shell AppDir/usr/bin/cove_shell
          cp cove AppDir/usr/lib/cove/cove
          cp -r web/dist AppDir/usr/share/cove/web/dist
          cp cove.png AppDir/usr/share/icons/hicolor/256x256/apps/cove.png

          # Thin launcher that passes --backend / --webroot to cove_shell.
          # $APPDIR is set unconditionally by the AppImage runtime to the
          # squashfs mount point, so it's more reliable than readlink-of-$0.
          # linuxdeploy's generated AppRun reads Exec= from the .desktop file
          # and invokes this script; linuxdeploy therefore handles all the
          # LD_LIBRARY_PATH / Qt plugin path setup — we leave AppRun alone.
          # exec is kept on a single line to avoid shell line-continuation.
          printf '%s\n%s\n' \
            '#!/bin/bash' \
            'exec "$(dirname "$(readlink -f "$0")")/cove_shell" --backend "$APPDIR/usr/lib/cove/cove" --webroot "$APPDIR/usr/share/cove/web/dist" "$@"' \
            > AppDir/usr/bin/cove_launcher
          chmod +x AppDir/usr/bin/cove_launcher

          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=Cove' \
            'Exec=cove_launcher' \
            'Icon=cove' \
            'Categories=AudioVideo;Video;Player;' \
            'Terminal=false' \
            > AppDir/usr/share/applications/cove.desktop

      - name: Bundle Qt + system libraries
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          export QMAKE=$(which qmake6)
          # QMLPATHS tells linuxdeploy-plugin-qt which QML files to scan for
          # imports. Without it the plugin won't know to copy QtWebEngine.
          export QMLPATHS=$(pwd)/qt/qml
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/cove_shell \
            --desktop-file AppDir/usr/share/applications/cove.desktop \
            --icon-file cove.png \
            --plugin qt

          # linuxdeploy-plugin-qt's QML scanner can still miss QtWebEngine
          # because it's split across several sub-modules in Qt6. Copy them
          # explicitly as a belt-and-suspenders guarantee.
          QML_DIR=$(qmake6 -query QT_INSTALL_QML)
          PLUGINS_DIR=$(qmake6 -query QT_INSTALL_PLUGINS)
          mkdir -p AppDir/usr/qml AppDir/usr/plugins/platforms \
                   AppDir/usr/plugins/wayland-decoration-client \
                   AppDir/usr/plugins/wayland-graphics-integration-client \
                   AppDir/usr/plugins/wayland-shell-integration
          for mod in QtWebEngine QtWebEngineQuick QtWebEngineCore; do
            [ -d "$QML_DIR/$mod" ] && cp -rn "$QML_DIR/$mod" AppDir/usr/qml/
          done
          # Wayland platform + supporting plugins (needed on Wayland desktops)
          cp -n "$PLUGINS_DIR/platforms"/libqwayland*.so \
               AppDir/usr/plugins/platforms/ 2>/dev/null || true
          for dir in wayland-decoration-client \
                     wayland-graphics-integration-client \
                     wayland-shell-integration; do
            [ -d "$PLUGINS_DIR/$dir" ] && \
              cp -rn "$PLUGINS_DIR/$dir/." "AppDir/usr/plugins/$dir/"
          done

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
          VERSION: ${{ github.ref_name }}
        run: |
          ./appimagetool-x86_64.AppImage AppDir cove-linux-amd64.AppImage

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: cove-linux-amd64.AppImage
