name: CI

# Run on every push/PR to catch regressions. On tag pushes the same checks
# run plus the `package` job, which bundles a release asset and uploads it.
on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

permissions:
  contents: write  # needed for the package job to upload release assets

jobs:
  go:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: go build -ldflags "-X main.Version=${{ github.ref_name }}" -o cove .

      - name: Vet
        run: go vet ./...

  web:
    name: Web build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

  qt:
    name: Qt shell build (Linux, best-effort)
    runs-on: ubuntu-24.04
    # Qt6 WebEngine and libmpv availability in CI runners can vary — treat as
    # non-blocking until the build is known stable in this environment.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + mpv + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-webengine-dev \
            libqt6webchannel6-dev \
            libmpv-dev

      - name: Configure
        run: cmake -S qt -B qt/build -G Ninja

      - name: Build
        run: cmake --build qt/build

  package:
    name: Package release asset
    needs: [go, web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-X main.Version=${{ github.ref_name }}" -o cove .
          cd web && npm run build

      - name: Package Linux amd64
        # The asset name MUST match the value returned by assetName() in
        # internal/updater/updater.go: "cove-linux-amd64.tar.gz".
        # The tarball layout must be: ./cove + ./web/dist/ (relative paths so
        # extraction works regardless of install location).
        run: |
          mkdir -p dist/web
          cp cove dist/cove
          cp -r web/dist dist/web/dist
          tar -czf cove-linux-amd64.tar.gz -C dist .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: cove-linux-amd64.tar.gz
