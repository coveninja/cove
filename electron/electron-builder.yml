appId: com.arcadyi.cove
productName: cove
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!svelte.config.mjs'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
# Shared across platforms. The Go sidecar binary differs by OS (cove vs
# cove.exe), so it's declared per-platform below; these merge with the
# platform-specific extraResources.
extraResources:
  - from: ../.env
    to: .env
win:
  executableName: cove
  extraResources:
    - from: ../cove.exe
      to: cove.exe
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
linux:
  target:
    - AppImage
  maintainer: electronjs.org
  category: Utility
  extraResources:
    - from: ../cove
      to: cove
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: Arcadyi
  repo: cove
  releaseType: release
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
